services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn run:app --host 0.0.0.0 --port 8000
    environment:
      CURRICULUM_USE_ARQ: "1"
      CURRICULUM_PIPELINE_V2: "1"
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - ./data:/app/data

  curriculum-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m arq backend.jobs.arq_settings.WorkerSettings
    environment:
      CURRICULUM_PIPELINE_V2: "1"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ./data:/app/data
