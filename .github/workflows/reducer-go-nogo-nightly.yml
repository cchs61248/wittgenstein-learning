# Nightly reducer Go/No-Go with real LLM (optional — requires repository secrets).
#
# Required secrets: ANTHROPIC_API_KEY or OPENAI_API_KEY (match DEFAULT_PROVIDER)
# Optional: GO_NOGO_LLM_PROVIDER
#
# Manual dispatch also available from Actions tab.

name: reducer-go-nogo-nightly

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  llm-live-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wittgenstein-learning
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/pip install -r backend/requirements.txt -q

      - name: Run live Go/No-Go gate
        env:
          RUN_LLM_TESTS: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DEFAULT_PROVIDER: ${{ vars.DEFAULT_PROVIDER || 'claude' }}
          GO_NOGO_LLM_PROVIDER: ${{ vars.GO_NOGO_LLM_PROVIDER }}
        run: |
          backend/.venv/bin/python -m pytest backend/tests/test_reducer_go_nogo_live.py -m llm_live -v --tb=short
