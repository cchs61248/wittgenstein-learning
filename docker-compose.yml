# Redis + curriculum Arq worker（本機 uvicorn 用 REDIS_URL=redis://localhost:6380/0）

#

# Worker 直接 bind-mount ./data/learning.db（需 CURRICULUM_USE_ARQ=1，uvicorn 不 in-process 寫 DB）

#

#   docker compose up -d --build

#   docker compose logs -f curriculum-worker

#

services:

  redis:

    image: redis:7-alpine

    container_name: wl-redis

    ports:

      - "6380:6379"

    restart: unless-stopped



  curriculum-worker:

    build:

      context: .

      dockerfile: Dockerfile.worker

    container_name: wl-curriculum-worker

    depends_on:

      - redis

    environment:

      CURRICULUM_PIPELINE_V2: "1"

      CURRICULUM_USE_ARQ: "1"

      LLM_CACHE_ENABLED: "1"

      REDIS_URL: redis://redis:6379/0

      DB_PATH: ../data/learning.db

      MONICA_BASE_URL: http://host.docker.internal:8001/v1

      SQLITE_JOURNAL_MODE: DELETE

    extra_hosts:

      - "host.docker.internal:host-gateway"

    volumes:

      - ./data:/app/data

      - ./backend:/app/backend

    restart: unless-stopped

