[pytest]
testpaths = backend/tests
pythonpath = .
markers =
    llm_live: live LLM integration (requires RUN_LLM_TESTS=1; excluded from default pytest)
    curriculum_live: live curriculum pipeline integration (requires RUN_LLM_TESTS=1; excluded from default pytest)
# 平時改 code / CI 只跑 mock 單元測試；真 LLM 需手動：RUN_LLM_TESTS=1 pytest -m llm_live
addopts = -m "not llm_live and not curriculum_live"
